<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculator – CodSoft Task 3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --panel: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --fg: #eaeaea;
    --muted: rgba(234,234,234,0.4);
    --btn-num: #1e2a45;
    --btn-op: #0f3460;
    --btn-eq: #e94560;
    --btn-clear: #2a1e3a;
    --shadow: 0 25px 60px rgba(0,0,0,0.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
    position: relative; overflow: hidden;
  }

  /* Decorative background circles */
  body::before {
    content: '';
    position: fixed; top: -200px; left: -200px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(233,69,96,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; bottom: -200px; right: -200px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(15,52,96,0.4) 0%, transparent 70%);
    pointer-events: none;
  }

  .page-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.2em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 2rem;
    animation: fadeUp 0.4s ease both;
  }

  .calculator {
    width: 340px;
    background: var(--surface);
    border-radius: 24px;
    box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden;
    animation: fadeUp 0.4s 0.1s ease both;
    position: relative; z-index: 1;
  }

  /* ── DISPLAY ── */
  .display {
    background: var(--bg);
    padding: 1.8rem 1.8rem 1.2rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    min-height: 130px;
    display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end;
  }
  .expr {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem; color: var(--muted);
    min-height: 1.4em; text-align: right;
    word-break: break-all; max-width: 100%;
    transition: all 0.2s;
  }
  .result {
    font-family: 'Space Mono', monospace;
    font-size: 2.6rem; color: var(--fg);
    font-weight: 700; text-align: right;
    word-break: break-all; max-width: 100%;
    transition: all 0.15s;
    line-height: 1.1; margin-top: 0.4rem;
  }
  .result.small { font-size: 1.8rem; }
  .result.error { color: var(--accent); font-size: 1.4rem; }

  /* ── GRID ── */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px; background: rgba(255,255,255,0.04);
    padding: 1px;
  }
  .btn {
    background: var(--btn-num);
    border: none; cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem; color: var(--fg);
    padding: 1.1rem 0.5rem;
    transition: background 0.12s, transform 0.08s, color 0.12s;
    display: flex; align-items: center; justify-content: center;
    position: relative; user-select: none;
  }
  .btn:active { transform: scale(0.92); }

  /* Ripple */
  .btn::after {
    content: ''; position: absolute; border-radius: 50%;
    width: 0; height: 0; background: rgba(255,255,255,0.15);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    transition: width 0.3s, height 0.3s, opacity 0.3s;
    opacity: 0;
  }
  .btn:active::after { width: 120px; height: 120px; opacity: 0; }

  .btn.op {
    background: var(--btn-op);
    color: #7eb5f7; font-size: 1.3rem;
  }
  .btn.op:hover { background: #1a4a80; }

  .btn.clear {
    background: var(--btn-clear);
    color: var(--accent); font-size: 0.85rem; letter-spacing: 0.04em;
  }
  .btn.clear:hover { background: rgba(233,69,96,0.15); }

  .btn.eq {
    background: var(--btn-eq);
    color: white; font-size: 1.4rem;
    grid-row: span 2;
  }
  .btn.eq:hover { background: #d63850; }

  .btn.zero { grid-column: span 2; justify-content: flex-start; padding-left: 1.6rem; }

  .btn.num:hover { background: #283a58; }
  .btn.pct { color: var(--accent2); }
  .btn.sign { color: var(--accent2); font-size: 1rem; }

  /* ── HISTORY ── */
  .history-toggle {
    text-align: center; padding: 0.9rem;
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); cursor: pointer; transition: color 0.2s;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .history-toggle:hover { color: var(--fg); }
  .history-panel {
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
    background: var(--bg); border-top: 1px solid rgba(255,255,255,0.05);
  }
  .history-panel.open { max-height: 200px; }
  .history-list {
    padding: 0.8rem 1.5rem; display: flex; flex-direction: column;
    gap: 0.5rem; max-height: 200px; overflow-y: auto;
  }
  .history-item {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem; color: var(--muted); text-align: right;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding-bottom: 0.5rem;
  }
  .history-item span { color: var(--fg); }
  .no-history { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 1rem 0; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.15s ease; }
</style>
</head>
<body>

<p class="page-title">CodSoft · Web Dev · Task 3</p>

<div class="calculator" id="calc">

  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons">
    <!-- Row 1 -->
    <button class="btn clear" data-action="clear">AC</button>
    <button class="btn sign op" data-action="sign">+/−</button>
    <button class="btn pct op" data-action="percent">%</button>
    <button class="btn op" data-action="op" data-val="÷">÷</button>

    <!-- Row 2 -->
    <button class="btn num" data-action="num" data-val="7">7</button>
    <button class="btn num" data-action="num" data-val="8">8</button>
    <button class="btn num" data-action="num" data-val="9">9</button>
    <button class="btn op" data-action="op" data-val="×">×</button>

    <!-- Row 3 -->
    <button class="btn num" data-action="num" data-val="4">4</button>
    <button class="btn num" data-action="num" data-val="5">5</button>
    <button class="btn num" data-action="num" data-val="6">6</button>
    <button class="btn op" data-action="op" data-val="−">−</button>

    <!-- Row 4 -->
    <button class="btn num" data-action="num" data-val="1">1</button>
    <button class="btn num" data-action="num" data-val="2">2</button>
    <button class="btn num" data-action="num" data-val="3">3</button>
    <button class="btn op" data-action="op" data-val="+">+</button>

    <!-- Row 5 -->
    <button class="btn num zero" data-action="num" data-val="0">0</button>
    <button class="btn num" data-action="dot">.</button>
    <button class="btn eq" data-action="eq">=</button>
  </div>

  <div class="history-toggle" onclick="toggleHistory()">▾ History</div>
  <div class="history-panel" id="historyPanel">
    <div class="history-list" id="historyList">
      <p class="no-history">No calculations yet.</p>
    </div>
  </div>
</div>

<script>
  let current = '0';
  let pending = null;    // { val, op }
  let justEvaled = false;
  let exprStr = '';
  const history = [];

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expr');

  function updateDisplay() {
    resultEl.className = 'result';
    if (current.length > 10) resultEl.classList.add('small');
    resultEl.textContent = current;
    exprEl.textContent = exprStr;
  }

  function triggerPop() {
    resultEl.classList.remove('pop');
    void resultEl.offsetWidth;
    resultEl.classList.add('pop');
  }

  function handleNum(v) {
    if (justEvaled) { current = v; exprStr = ''; justEvaled = false; }
    else if (current === '0') current = v;
    else current += v;
    updateDisplay();
  }

  function handleDot() {
    if (justEvaled) { current = '0.'; exprStr = ''; justEvaled = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function handleOp(op) {
    if (pending && !justEvaled) {
      compute();
    }
    pending = { val: parseFloat(current), op };
    exprStr = formatNum(current) + ' ' + op;
    justEvaled = true;
    updateDisplay();
  }

  function compute() {
    if (!pending) return;
    const a = pending.val, b = parseFloat(current);
    let res;
    switch (pending.op) {
      case '+': res = a + b; break;
      case '−': res = a - b; break;
      case '×': res = a * b; break;
      case '÷': res = b === 0 ? NaN : a / b; break;
    }
    const expr = `${formatNum(a)} ${pending.op} ${formatNum(b)} =`;
    if (isNaN(res)) {
      addHistory(expr, 'Error');
      exprStr = expr;
      current = 'Error';
      resultEl.classList.add('error');
    } else {
      const rounded = parseFloat(res.toPrecision(10)).toString();
      addHistory(expr, rounded);
      exprStr = expr;
      current = rounded;
    }
    pending = null;
    justEvaled = true;
    triggerPop();
    updateDisplay();
  }

  function handleClear() {
    current = '0'; pending = null; justEvaled = false; exprStr = '';
    updateDisplay();
  }

  function handleSign() {
    if (current === 'Error') return;
    current = (parseFloat(current) * -1).toString();
    updateDisplay();
  }

  function handlePercent() {
    if (current === 'Error') return;
    current = (parseFloat(current) / 100).toString();
    updateDisplay();
  }

  function formatNum(n) {
    const s = n.toString();
    return s.length > 8 ? parseFloat(n.toPrecision(6)).toString() : s;
  }

  function addHistory(expr, result) {
    history.unshift({ expr, result });
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) { list.innerHTML = '<p class="no-history">No calculations yet.</p>'; return; }
    list.innerHTML = history.slice(0, 15).map(h =>
      `<div class="history-item">${h.expr} <span>${h.result}</span></div>`
    ).join('');
  }

  function toggleHistory() {
    document.getElementById('historyPanel').classList.toggle('open');
  }

  // Button clicks
  document.getElementById('calc').addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'num')     handleNum(btn.dataset.val);
    if (action === 'op')      handleOp(btn.dataset.val);
    if (action === 'eq')      compute();
    if (action === 'clear')   handleClear();
    if (action === 'sign')    handleSign();
    if (action === 'percent') handlePercent();
    if (action === 'dot')     handleDot();
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key)) handleNum(e.key);
    else if (e.key === '.') handleDot();
    else if (e.key === '+') handleOp('+');
    else if (e.key === '-') handleOp('−');
    else if (e.key === '*') handleOp('×');
    else if (e.key === '/') { e.preventDefault(); handleOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') compute();
    else if (e.key === 'Backspace') {
      if (current.length > 1 && !justEvaled) current = current.slice(0,-1);
      else current = '0';
      updateDisplay();
    }
    else if (e.key === 'Escape') handleClear();
    else if (e.key === '%') handlePercent();
  });

  updateDisplay();
</script>
</body>
</html>
